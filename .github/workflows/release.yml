name: Build and Release APKs

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Streamer APK
        run: |
          cd Streamer
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Receiver APK
        run: |
          cd Receiver
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: apks
          path: |
            Streamer/app/build/outputs/apk/debug/app-debug.apk
            Receiver/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v3
        with:
          name: apks
          path: apks/

      - name: Rename APKs
        run: |
          mv apks/Streamer/app/build/outputs/apk/debug/app-debug.apk apks/Streamer-app-debug.apk
          mv apks/Receiver/app/build/outputs/apk/debug/app-debug.apk apks/Receiver-app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apks/Streamer-app-debug.apk
            apks/Receiver-app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
