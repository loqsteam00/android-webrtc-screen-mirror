name: Build and Release APKs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Streamer APK
        run: |
          cd Streamer
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Receiver APK
        run: |
          cd Receiver
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APKs
        run: |
          mv Streamer/app/build/outputs/apk/debug/app-debug.apk Streamer-app-debug.apk
          mv Receiver/app/build/outputs/apk/debug/app-debug.apk Receiver-app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Streamer-app-debug.apk
            Receiver-app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
